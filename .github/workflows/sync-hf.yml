name: Sync della repo sullo Space HF
env:
  HF_USERNAME: provetta
  HF_SPACE: addon

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Request Factory Rebuild
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
          "https://huggingface.co"
